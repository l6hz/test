<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 微信卡片伪装成Word文档 -->
    <meta property="og:title" content="书.docx">
    <meta property="og:description" content="点击查看">
    <meta property="og:image" content="https://zweb-cdn.oss-cn-hangzhou.aliyuncs.com/word-icon.png">
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
        video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1;
            object-fit: cover;
        }
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.01);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            pointer-events: none;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        #tapHint {
            position: fixed; bottom:30px; left:50%; transform:translateX(-50%);
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 把这里换成你自己的视频链接 -->
    <video id="mainVideo" autoplay muted playsinline loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div id="overlay">正在为你播放…</div>
    <div id="tapHint">🔊 点一下画面打开声音</div>

    <script>
        const video = document.getElementById('mainVideo');
        const overlay = document.getElementById('overlay');
        const tapHint = document.getElementById('tapHint');

        // 点击视频取消静音并全屏（更好的观看体验）
        video.addEventListener('click', function() {
            if (video.muted) {
                video.muted = false;
                video.play();
                tapHint.style.display = 'none';
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                }
            }
        });

        // 初始播放受阻时的备选（基本不会发生，静音允许自动播）
        video.play().catch(() => {
            overlay.innerHTML = '请轻触画面开始';
            overlay.style.animation = 'none';
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'auto';
            overlay.addEventListener('click', () => {
                video.muted = false;
                video.play();
                overlay.style.display = 'none';
            });
        });
    </script>
</body>
</html>
